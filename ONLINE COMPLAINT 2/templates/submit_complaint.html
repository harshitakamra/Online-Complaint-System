{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-7">
    <div class="glass-card">
      <div class="d-flex align-items-center mb-4 border-bottom border-light pb-3">
        <i class="fa-solid fa-file-signature display-6 text-primary me-3"></i>
        <div>
          <h2 class="fw-bold mb-0">Submit Complaint</h2>
          <p class="text-muted small mb-0">Please provide detailed information below</p>
        </div>
      </div>
      <form method="post">
        <div class="mb-3">
          <label for="title" class="form-label ms-1">Complaint Title</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="fa-solid fa-heading text-muted"></i></span>
            <input type="text" class="form-control ps-2" id="title" name="title" placeholder="Brief summary of the issue" required>
          </div>
        </div>
        
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="category" class="form-label ms-1">Category</label>
            <div class="input-group">
              <span class="input-group-text bg-white"><i class="fa-solid fa-list text-muted"></i></span>
              <select class="form-select ps-2" id="category" name="category" required>
                <option value="">Select category...</option>
                <option value="Maintenance">Maintenance</option>
                <option value="Services">Services</option>
                <option value="Administration">Administration</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <label for="location" class="form-label ms-1">Location <span class="text-muted fw-normal">(Optional)</span></label>
            <div class="input-group">
              <span class="input-group-text bg-white"><i class="fa-solid fa-location-dot text-muted"></i></span>
              <input type="text" class="form-control ps-2" id="location" name="location" placeholder="Room, block, etc.">
            </div>
          </div>
        </div>

        <div class="mb-4">
          <label for="description" class="form-label ms-1">Detailed Description</label>
          <textarea class="form-control" id="description" name="description" rows="5" placeholder="Please describe the issue in detail..." required></textarea>
        </div>
        
        <div class="d-flex justify-content-between align-items-center">
          <a href="{{ url_for('user_dashboard') }}" class="btn btn-custom-outline">Cancel</a>
          <button type="submit" class="btn btn-custom px-4"><i class="fa-solid fa-paper-plane me-2"></i>Submit</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
