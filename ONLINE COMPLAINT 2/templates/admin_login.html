{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
  <div class="col-md-6 col-lg-5 col-xl-4">
    <div class="glass-card text-center text-md-start" style="border-top: 4px solid #ef4444;">
      <div class="text-center mb-4">
        <div class="display-5 mb-3 text-danger">
          <i class="fa-solid fa-user-shield"></i>
        </div>
        <h2 class="fw-bold fs-3 text-dark">Admin Login</h2>
        <p class="text-muted small">System administration access</p>
      </div>
      <form method="post" action="{{ url_for('admin_login') }}">
        <div class="mb-3">
          <label for="email" class="form-label ms-1">Admin Email</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="fa-regular fa-envelope text-muted"></i></span>
            <input type="email" class="form-control border-start-0 ps-0" id="email" name="email" placeholder="admin@example.com" required>
          </div>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label ms-1">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
            <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn btn-danger-custom w-100 mb-2 py-2 fs-6">Login as Admin</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
